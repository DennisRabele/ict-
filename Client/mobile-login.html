<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Customer Login | ICT Commerce</title>
    <link rel="stylesheet" href="mobile.css" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body class="mobile-login">
    <main class="phone-frame login-frame">
      <section class="mobile-hero">
        <img src="assets/mobile-suite.svg" alt="ICT mobile app preview" />
      </section>
      <section class="login-card">
        <div class="brand-row">
          <span class="brand-mark">IC</span>
          <div>
            <p class="eyebrow">Mobile customer route</p>
            <h1>Client App</h1>
          </div>
        </div>
        <div id="mobileAuthNotice" class="auth-notice" hidden></div>
        <form id="mobileRegisterForm" class="stacked-form" novalidate>
          <p class="eyebrow">Create customer</p>
          <label>
            First Name
            <input name="firstName" required maxlength="30" pattern="[A-Za-z0-9 ]+" />
          </label>
          <label>
            Second Name
            <input name="secondName" required maxlength="30" pattern="[A-Za-z0-9 ]+" />
          </label>
          <label>
            Email address
            <input name="email" type="email" required />
          </label>
          <label>
            Password
            <input name="password" type="password" required minlength="6" pattern="[A-Za-z0-9]+" />
          </label>
          <button class="primary-button" type="submit">
            <span class="icon-box">R</span>
            Register
          </button>
          <button id="showMobileLogin" class="ghost-button" type="button">Already have account, login</button>
        </form>
        <form id="mobileLoginForm" class="stacked-form" hidden novalidate>
          <p class="eyebrow">Mobile login</p>
          <label>
            First Name
            <input name="firstName" required maxlength="30" pattern="[A-Za-z0-9 ]+" />
          </label>
          <label>
            Second Name
            <input name="secondName" required maxlength="30" pattern="[A-Za-z0-9 ]+" />
          </label>
          <label>
            Email address
            <input name="email" type="email" required />
          </label>
          <label>
            Password
            <input name="password" type="password" required minlength="6" pattern="[A-Za-z0-9]+" />
          </label>
          <button class="primary-button" type="submit">
            <span class="icon-box">M</span>
            Enter mobile app
          </button>
          <button id="showMobileRegister" class="ghost-button" type="button">Create account</button>
        </form>
      </section>
    </main>
    <script type="module">
      import { doc, serverTimestamp, setDoc } from "firebase/firestore";
      import { customerDb, firebaseReady } from "./firebase.js";

      const accountsKey = "ict-mobile-accounts";
      const sessionKey = "ict-mobile-session";
      const registerForm = document.getElementById("mobileRegisterForm");
      const loginForm = document.getElementById("mobileLoginForm");
      const notice = document.getElementById("mobileAuthNotice");

      function readAccounts() {
        try {
          return JSON.parse(localStorage.getItem(accountsKey) || "[]");
        } catch {
          return [];
        }
      }

      function saveAccounts(accounts) {
        localStorage.setItem(accountsKey, JSON.stringify(accounts));
      }

      function customerId(value) {
        return "customer-" + value.email.replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase();
      }

      async function recordCustomerProfile(value, id) {
        if (!firebaseReady) return;
        await setDoc(doc(customerDb, "customerProfiles", id), {
          id,
          firstName: value.firstName,
          secondName: value.secondName,
          name: value.firstName + " " + value.secondName,
          email: value.email,
          accountType: "Retail Customer",
          source: "mobile-app",
          role: "customer",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      }

      function details(form) {
        const data = new FormData(form);
        return {
          firstName: String(data.get("firstName") || "").trim(),
          secondName: String(data.get("secondName") || "").trim(),
          email: String(data.get("email") || "").trim().toLowerCase(),
          password: String(data.get("password") || "")
        };
      }

      const plainTextPattern = /^[A-Za-z0-9 ]+$/;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function validateName(label, value) {
        if (!value) return label + " is required.";
        if (!plainTextPattern.test(value)) return label + " must contain only letters, numbers, and spaces.";
        if (value.length > 30) return label + " must be 30 characters or fewer.";
        return "";
      }

      function validate(value) {
        const firstNameError = validateName("First name", value.firstName);
        if (firstNameError) return firstNameError;
        const secondNameError = validateName("Second name", value.secondName);
        if (secondNameError) return secondNameError;
        if (!value.email) return "Email address is required.";
        if (!emailPattern.test(value.email)) return "Email address must be valid, for example customer@example.com.";
        if (!value.password) return "Password is required.";
        if (!/^[A-Za-z0-9]+$/.test(value.password)) return "Password must contain only letters and numbers.";
        if (value.password.length < 6 || !/\d/.test(value.password)) return "Password must be at least 6 characters and include 1 number.";
        return "";
      }

      function show(type, message) {
        notice.hidden = false;
        notice.className = "auth-notice " + type;
        notice.textContent = message;
      }

      function panel(name) {
        const isLogin = name === "login";
        registerForm.reset();
        loginForm.reset();
        loginForm.hidden = !isLogin;
        registerForm.hidden = isLogin;
      }

      registerForm.addEventListener("submit", async function (event) {
        event.preventDefault();
        const value = details(registerForm);
        const error = validate(value);
        const accounts = readAccounts();
        if (error) return show("error", "Registration unsuccessful: " + error);
        if (accounts.some((account) => account.email === value.email)) return show("error", "Registration unsuccessful: email already exists.");
        const id = customerId(value);
        try {
          await recordCustomerProfile(value, id);
        } catch (profileError) {
          console.error(profileError);
          saveAccounts(accounts.concat([{ ...value, id }]));
          registerForm.reset();
          show("success", "Registration successful locally. Firebase customerProfiles could not be updated right now.");
          panel("login");
          return;
        }
        saveAccounts(accounts.concat([{ ...value, id }]));
        registerForm.reset();
        show("success", "Registration successful: customer recorded in Firebase. Please log in.");
        panel("login");
      });

      loginForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const value = details(loginForm);
        const error = validate(value);
        if (error) return show("error", "Login unsuccessful: " + error);
        const account = readAccounts().find((item) =>
          item.firstName.toLowerCase() === value.firstName.toLowerCase()
          && item.secondName.toLowerCase() === value.secondName.toLowerCase()
          && item.email === value.email
          && item.password === value.password
        );
        if (!account) {
          loginForm.reset();
          return show("error", "Login unsuccessful: details do not match a registered customer.");
        }
        localStorage.setItem(sessionKey, JSON.stringify({ id: account.id, firstName: account.firstName, secondName: account.secondName, email: account.email }));
        window.location.href = "index.html";
      });

      document.getElementById("showMobileLogin").addEventListener("click", function () { panel("login"); });
      document.getElementById("showMobileRegister").addEventListener("click", function () { panel("register"); });
      panel(readAccounts().length ? "login" : "register");
    </script>
  </body>
</html>
